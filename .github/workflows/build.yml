name: Build & Release

# Runs on every push to main and every pull request (so broken builds are caught early),
# and additionally publishes a GitHub Release whenever you push a version tag like `v0.1.0`.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

# Needed so the release job can create/update releases.
permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-14 ships Xcode 15 (keeps the -ld_classic linker flag working).
        os: [macos-14, windows-latest]

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build all formats
        run: cmake --build build --target additive_synth_All --config Release --parallel 4

      # JUCE puts artefacts under different folders depending on the generator:
      #   macOS (Unix Makefiles, single-config): build/additive_synth_artefacts/<FORMAT>/
      #   Windows (Visual Studio, multi-config):  build/additive_synth_artefacts/Release/<FORMAT>/
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd build/additive_synth_artefacts
          zip -r "$GITHUB_WORKSPACE/AdditiveSynthesizer-macOS.zip" VST3 AU Standalone

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $base = "build/additive_synth_artefacts/Release"
          Compress-Archive -Path "$base/VST3","$base/Standalone" -DestinationPath AdditiveSynthesizer-Windows.zip

      # Downloadable from the Actions run page on every build (kept ~90 days).
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AdditiveSynthesizer-${{ runner.os }}
          path: AdditiveSynthesizer-*.zip

      # Only when a tag is pushed: attach the zip to a public GitHub Release.
      - name: Publish to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: AdditiveSynthesizer-*.zip
